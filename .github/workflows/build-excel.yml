name: 📊 Build Excel File

on:
  workflow_dispatch:
    inputs:
      description:
        description: "Describe the spreadsheet you need in plain English"
        required: true
        type: string
      filename:
        description: "File name (without .xlsx)"
        required: false
        default: "My_Spreadsheet"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install openpyxl anthropic

      - name: Generate spreadsheet
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          DESCRIPTION: ${{ inputs.description }}
          FILE_NAME: ${{ inputs.filename }}
        run: python generate_ci.py

      - name: Upload Excel file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.filename || 'My_Spreadsheet' }}
          path: "*.xlsx"
          retention-days: 30
