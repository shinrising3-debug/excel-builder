name: 📊 Build Excel File

on:
  workflow_dispatch:
    inputs:
      title:
        description: "Sheet title (e.g. Employee Attendance Tracker)"
        required: true
        type: string
      columns:
        description: |
          Columns — format: Name, Date (date), Amount (currency), Status (dropdown: Pending|Fixed|Done), Notes (long)
          Types: text, date, number, currency, long, dropdown
        required: true
        type: string
      rows:
        description: "Number of pre-formatted rows"
        required: false
        default: "200"
        type: string
      sample_data:
        description: "Optional sample row(s) — separate columns with | and rows with newlines"
        required: false
        type: string
      filename:
        description: "File name (without .xlsx)"
        required: false
        default: "My_Spreadsheet"
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install openpyxl
        run: pip install openpyxl

      - name: Generate spreadsheet
        env:
          TITLE: ${{ inputs.title }}
          COLUMNS: ${{ inputs.columns }}
          NUM_ROWS: ${{ inputs.rows }}
          SAMPLE_DATA: ${{ inputs.sample_data }}
          FILE_NAME: ${{ inputs.filename }}
        run: python generate_ci.py

      - name: Upload Excel file
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.filename || 'My_Spreadsheet' }}
          path: "*.xlsx"
          retention-days: 90
